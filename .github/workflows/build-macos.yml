name: Build macOS Patched App

on:
  workflow_dispatch:
    inputs:
      arm64_zip_url:
        description: "Apple Silicon 原版 .app 的 zip 下载地址（arm64）"
        required: true
        type: string
      x86_zip_url:
        description: "Intel 原版 .app 的 zip 下载地址（x86_64）"
        required: false
        type: string

jobs:
  build-arm64:
    name: Apple Silicon (arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Download original arm64 app
        run: |
          set -euo pipefail
          curl -fL "${{ inputs.arm64_zip_url }}" -o input.zip
          unzip -q input.zip
          APP="$(find . -name '*.app' -type d ! -path './.git/*' | head -1)"
          if [ -z "$APP" ]; then
            echo "No .app found in zip. Zip must contain a .app bundle."
            find . -maxdepth 4 -type f -o -type d | head -50
            exit 1
          fi
          echo "Found app: $APP"
          echo "INPUT_APP=$APP" >> "$GITHUB_ENV"

      - name: Build patched arm64 app
        run: |
          python build_macos.py --arch arm64 \
            --input "$INPUT_APP" \
            --output AIAssistant-360-no-renew-arm64.app \
            --force

      - name: Zip output
        run: zip -r AIAssistant-360-no-renew-arm64.zip AIAssistant-360-no-renew-arm64.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIAssistant-360-no-renew-arm64
          path: AIAssistant-360-no-renew-arm64.zip
          retention-days: 30

  build-x86_64:
    name: Intel (x86_64)
    runs-on: macos-13
    if: ${{ inputs.x86_zip_url != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Download original x86_64 app
        run: |
          set -euo pipefail
          curl -fL "${{ inputs.x86_zip_url }}" -o input.zip
          unzip -q input.zip
          APP="$(find . -name '*.app' -type d ! -path './.git/*' | head -1)"
          if [ -z "$APP" ]; then
            echo "No .app found in zip. Zip must contain a .app bundle."
            find . -maxdepth 4 -type f -o -type d | head -50
            exit 1
          fi
          echo "Found app: $APP"
          echo "INPUT_APP=$APP" >> "$GITHUB_ENV"

      - name: Build patched x86_64 app
        run: |
          python build_macos.py --arch x86_64 \
            --input "$INPUT_APP" \
            --output AIAssistant-360-no-renew-x86_64.app \
            --force

      - name: Zip output
        run: zip -r AIAssistant-360-no-renew-x86_64.zip AIAssistant-360-no-renew-x86_64.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIAssistant-360-no-renew-x86_64
          path: AIAssistant-360-no-renew-x86_64.zip
          retention-days: 30
