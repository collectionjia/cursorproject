name: Build macOS Patched App

on:
  workflow_dispatch:
    inputs:
      arm64_zip_url:
        description: "Apple Silicon 原版安装包直链（支持 .dmg 或 .zip，arm64）"
        required: false
        type: string
        default: "https://github.com/collectionjia/cursorproject/releases/download/v1.0-original-arm64/AIAssistant-m-360.dmg"
      x86_zip_url:
        description: "Intel 原版安装包直链（支持 .dmg 或 .zip，x86_64；留空则只打 arm64）"
        required: false
        type: string
        default: ""
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-macos.yml"
      - ".github/scripts/extract_macos_app.sh"
      - "build_macos.py"
      - "patch_no_renew_menu.py"

jobs:
  build-arm64:
    name: Apple Silicon (arm64)
    runs-on: macos-14
    env:
      DOWNLOAD_URL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.arm64_zip_url != '' && github.event.inputs.arm64_zip_url || 'https://github.com/collectionjia/cursorproject/releases/download/v1.0-original-arm64/AIAssistant-m-360.dmg' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Extract original arm64 app (dmg or zip)
        id: extract
        run: |
          chmod +x .github/scripts/extract_macos_app.sh
          set -x
          APP_PATH="$(.github/scripts/extract_macos_app.sh "$DOWNLOAD_URL" 2>extract_input/extract.log)"
          echo "INPUT_APP=$APP_PATH" >> "$GITHUB_ENV"
          ls -la "$APP_PATH/Contents/MacOS" || true

      - name: Upload extract debug on failure
        if: failure() && steps.extract.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: extract-debug-arm64
          path: |
            extract_input/attach.err
            extract_input/mount.err
            extract_input/imageinfo.txt
            extract_input/attach.plist
            extract_input/extract.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Build patched arm64 app
        run: |
          python build_macos.py --arch arm64 \
            --input "$INPUT_APP" \
            --output AIAssistant-360-no-renew-arm64.app \
            --force

      - name: Zip output
        run: zip -r AIAssistant-360-no-renew-arm64.zip AIAssistant-360-no-renew-arm64.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIAssistant-360-no-renew-arm64
          path: AIAssistant-360-no-renew-arm64.zip
          retention-days: 30

  build-x86_64:
    name: Intel (x86_64)
    runs-on: macos-13
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.x86_zip_url != '' }}
    env:
      DOWNLOAD_URL: ${{ github.event.inputs.x86_zip_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Extract original x86_64 app (dmg or zip)
        run: |
          chmod +x .github/scripts/extract_macos_app.sh
          set -x
          APP_PATH="$(.github/scripts/extract_macos_app.sh "$DOWNLOAD_URL")"
          echo "INPUT_APP=$APP_PATH" >> "$GITHUB_ENV"
          ls -la "$APP_PATH/Contents/MacOS" || true

      - name: Build patched x86_64 app
        run: |
          python build_macos.py --arch x86_64 \
            --input "$INPUT_APP" \
            --output AIAssistant-360-no-renew-x86_64.app \
            --force

      - name: Zip output
        run: zip -r AIAssistant-360-no-renew-x86_64.zip AIAssistant-360-no-renew-x86_64.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIAssistant-360-no-renew-x86_64
          path: AIAssistant-360-no-renew-x86_64.zip
          retention-days: 30
