name: Build macOS Patched App (Intel only)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-macos-intel.yml"

jobs:
  build-x86_64:
    name: Intel (x86_64)
    runs-on: macos-13
    env:
      DOWNLOAD_URL: https://github.com/collectionjia/cursorproject/releases/download/v1.0-original-x86_64/AIAssistant-intel-360.dmg
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Install extract tools
        run: brew install p7zip

      - name: Extract original x86_64 app (dmg or zip)
        id: extract
        run: |
          echo "DOWNLOAD_URL=$DOWNLOAD_URL"
          chmod +x .github/scripts/extract_macos_app.sh
          set -x
          mkdir -p extract_input
          if ! APP_PATH="$(.github/scripts/extract_macos_app.sh "$DOWNLOAD_URL" 2>extract_input/extract.log)"; then
            echo "::group::extract.log"
            cat extract_input/extract.log || true
            echo "::endgroup::"
            exit 1
          fi
          echo "INPUT_APP=$APP_PATH" >> "$GITHUB_ENV"
          ls -la "$APP_PATH/Contents/MacOS" || true

      - name: Build patched x86_64 app
        run: |
          python build_macos.py --arch x86_64 \
            --input "$INPUT_APP" \
            --output AIAssistant-360-no-renew-x86_64.app \
            --force 2>&1 | tee build.log || (cat build.log && exit 1)

      - name: Zip output
        run: zip -r AIAssistant-360-no-renew-x86_64.zip AIAssistant-360-no-renew-x86_64.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIAssistant-360-no-renew-x86_64
          path: AIAssistant-360-no-renew-x86_64.zip
          retention-days: 30
